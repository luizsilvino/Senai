<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Média Escolar</title>
</head>
<body>

<h2>Sistema de Média Escolar</h2>

<input type="number" id="nota1" placeholder="Nota 1">
<input type="number" id="nota2" placeholder="Nota 2">
<input type="number" id="nota3" placeholder="Nota 3">

<button onclick="calcular()">Calcular Média</button>

<p id="resultado"></p>

<script>

const MEDIA_MINIMA = 7;

function calcular(){

let n1 = Number(document.getElementById("nota1").value);
let n2 = Number(document.getElementById("nota2").value);
let n3 = Number(document.getElementById("nota3").value);

let media = (n1+n2+n3)/3;

if(media >= MEDIA_MINIMA){
document.getElementById("resultado").innerText = "Média: "+media+" - Aprovado";
}else{
document.getElementById("resultado").innerText = "Média: "+media+" - Reprovado";
}

}

</script>

</body>
</html>
